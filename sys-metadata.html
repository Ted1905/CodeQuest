<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeQuest - Admin Terminal</title>
    <style>
        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body {
            background-color: #050505; color: #0f0; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        h1 { text-shadow: 0 0 10px #0f0; border-bottom: 2px solid #0f0; padding-bottom: 10px; width: 100%; text-align: center; }
        
        /* DASHBOARD STATS */
        .dashboard {
            display: flex; gap: 20px; margin-bottom: 30px; width: 100%; max-width: 1000px;
        }
        .stat-box {
            background: rgba(0, 255, 0, 0.05); border: 1px solid #0f0;
            padding: 20px; flex: 1; text-align: center; border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,255,0,0.2);
        }
        .stat-box h3 { margin: 0 0 10px 0; color: #fff; font-size: 1.2rem; }
        .stat-box span { font-size: 2rem; font-weight: bold; text-shadow: 0 0 5px #0f0; }

        /* TABLE STYLES */
        .table-container { width: 100%; max-width: 1000px; overflow-x: auto; }
        table {
            width: 100%; border-collapse: collapse; background: rgba(0, 0, 0, 0.8);
            border: 1px solid #0f0;
        }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #0f0; }
        th { background-color: #0f0; color: #000; font-weight: bold; }
        tr:hover { background-color: rgba(0, 255, 0, 0.2); }
        
        .refresh-btn {
            background: #0f0; color: #000; border: none; padding: 10px 20px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-bottom: 20px;
            border-radius: 5px; transition: 0.3s;
        }
        .refresh-btn:hover { background: #fff; box-shadow: 0 0 15px #0f0; }
        #loading { display: none; margin-bottom: 15px; font-style: italic; }

        /* LOGIN OVERLAY CSS */
        #adminLoginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
    </style>
</head>
<body>

    <!-- MATRIX LOGIN OVERLAY -->
    <div id="adminLoginOverlay">
        <h2 style="color:#0f0; text-shadow:0 0 10px #0f0; margin-bottom:20px;">>_ ADMIN AUTHENTICATION REQUIRED</h2>
        <div style="border:1px solid #0f0; padding:30px; background:rgba(0,255,0,0.05); border-radius:10px; box-shadow:0 0 20px rgba(0,255,0,0.2);">
            <input type="password" id="adminPassInput" placeholder="ENTER ACCESS CODE" 
                   style="background:transparent; border:1px solid #0f0; color:#0f0; padding:10px; font-size:1.2rem; width:250px; outline:none; text-align:center;">
            <br><br>
            <button onclick="checkAccess()" 
                    style="background:#0f0; color:#000; border:none; padding:10px; width:100%; font-weight:bold; cursor:pointer; font-size:1rem;">
                >>> ACCESS <<<
            </button>
        </div>
    </div>

    <!-- MAIN ADMIN CONTENT -->
    <h1>>_ MATRIX COMMAND CENTER</h1>
    
    <button class="refresh-btn" onclick="fetchData()">[ REFRESH DATA ]</button>
    <div id="loading">Fetching data from secure servers... Please wait.</div>

    <div class="dashboard">
        <div class="stat-box">
            <h3>Total Agents</h3>
            <span id="totalAgents">0</span>
        </div>
        <div class="stat-box">
            <h3>Highest Score</h3>
            <span id="highestScore">0/0</span>
        </div>
        <div class="stat-box">
            <h3>Fastest Time</h3>
            <span id="fastestTime">--:--</span>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Date / Time</th>
                    <th>Agent Name</th>
                    <th>Score</th>
                    <th>Time</th>
                    <th>Mistakes Log</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Veriler buraya düşecek -->
            </tbody>
        </table>
    </div>
